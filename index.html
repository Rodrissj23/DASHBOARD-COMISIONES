<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Comisiones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F6FA;
    --card-bg: #FFFFFF;
    --ink: #1B2138;
    --ink-soft: #6B7280;
    --ink-faint: #9AA1B2;
    --coral: #EF6C57;
    --orange: #F2994A;
    --teal: #14B8A6;
    --teal-dark: #0F9D8E;
    --purple: #8B5CF6;
    --mint-bg: #E6F7F4;
    --mint-text: #0F9D8E;
    --border: #E7E9F0;
    --radius: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .crumb {
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }

  h1.title {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }

  .subtitle {
    color: var(--ink-soft);
    font-size: 14px;
    margin: 0 0 32px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  .card-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }

  .card-icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .icon-orange { background: #FCEBDD; color: var(--orange); }
  .icon-teal { background: var(--mint-bg); color: var(--teal-dark); }
  .icon-purple { background: #EFE9FE; color: var(--purple); }

  .card-body {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .card-count {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 26px;
  }

  .card-money-wrap { display: flex; flex-direction: column; }

  .card-money {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--coral);
  }

  .card-caption {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  .bar-track {
    height: 6px;
    border-radius: 4px;
    background: var(--border);
    margin-top: 18px;
    overflow: hidden;
  }

  .bar-fill { height: 100%; border-radius: 4px; }
  .fill-orange { background: var(--orange); }
  .fill-teal { background: linear-gradient(90deg, var(--teal-dark), var(--teal)); }
  .fill-purple { background: var(--purple); }

  .lower {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    align-items: start;
  }

  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .panel h2 {
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 20px;
  }

  .chart-note {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin-top: 16px;
  }

  .chart-note b { color: var(--ink); }

  .table-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .badge-count {
    background: #FDEDEA;
    color: var(--coral);
    font-size: 11.5px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 20px;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    text-align: left;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    color: var(--ink-faint);
    font-weight: 700;
    padding: 0 10px 10px;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 14px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
    vertical-align: top;
  }

  tbody tr:last-child td { border-bottom: none; }

  .num-cell { color: var(--ink-faint); font-weight: 600; }
  .titular { font-weight: 600; }
  .dni { color: var(--ink-faint); font-size: 12px; margin-top: 2px; }
  .money-cell { color: var(--coral); font-weight: 700; }

  .pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .pill-aprobada { background: var(--mint-bg); color: var(--mint-text); }
  .pill-otro { background: #EEF0F5; color: var(--ink-soft); }

  .empty, .loading {
    padding: 40px 0;
    text-align: center;
    color: var(--ink-faint);
    font-size: 13.5px;
  }

  @media (max-width: 900px) {
    .cards { grid-template-columns: 1fr; }
    .lower { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="crumb">Home &nbsp;›&nbsp; Dashboard</div>
  <h1 class="title">DASHBOARD</h1>
  <p class="subtitle">Ventas aprobadas · control de comisiones</p>

  <div class="cards" id="cards">
    <div class="loading">Cargando resumen…</div>
  </div>

  <div class="lower">
    <div class="panel">
      <h2>Evolución mensual</h2>
      <div id="chart"></div>
      <div class="chart-note" id="chartNote"></div>
    </div>

    <div class="panel">
      <div class="table-head">
        <h2 style="margin:0;">Últimas Ventas Aprobadas</h2>
        <span class="badge-count" id="tableBadge"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Titular / DNI</th>
            <th>Valor Plan</th>
            <th>Cápitas</th>
            <th>Fecha</th>
            <th>Comisión</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" class="loading">Cargando ventas…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
